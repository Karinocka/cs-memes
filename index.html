<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CS 1.6 — Легенды сервера</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0e17;
            color: #c0c0c0;
            min-height: 100vh;
            background-image: url('data:image/svg+xml;utf8,<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><text x="10" y="30" font-family="Courier New" font-size="12" fill="rgba(0,255,200,0.02)">CS</text><text x="40" y="70" font-family="Courier New" font-size="14" fill="rgba(0,255,200,0.02)">1.6</text><text x="70" y="40" font-family="Courier New" font-size="10" fill="rgba(0,255,200,0.02)">RUSH</text></svg>');
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            background: rgba(10, 14, 23, 0.92);
            backdrop-filter: blur(12px);
            border-bottom: 2px solid rgba(0, 255, 200, 0.06);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px 24px;
        }

        .logo {
            font-size: 26px;
            font-weight: 700;
            color: #00ffc8;
            text-shadow: 0 0 30px rgba(0, 255, 200, 0.1);
        }

        .logo span {
            color: #ffcc00;
        }

        .logo small {
            font-size: 11px;
            color: #5a6a7a;
            font-weight: 400;
            letter-spacing: 2px;
            display: block;
            margin-top: 2px;
        }

        .subtitle {
            color: #5a6a7a;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .subtitle i {
            color: #ff6b6b;
            font-style: normal;
        }

        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin: 30px 0;
            padding: 20px 24px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 255, 200, 0.04);
            border-radius: 8px;
            justify-content: center;
        }

        .stats .item {
            text-align: center;
        }

        .stats .item .num {
            font-size: 28px;
            font-weight: 700;
            color: #ffcc00;
        }

        .stats .item .label {
            font-size: 10px;
            color: #5a6a7a;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 20px;
            padding: 20px 0 40px;
        }

        .card {
            background: rgba(0, 0, 0, 0.45);
            border: 1px solid rgba(0, 255, 200, 0.04);
            border-radius: 16px;
            padding: 20px 14px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .card:hover {
            border-color: rgba(0, 255, 200, 0.2);
            transform: translateY(-8px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }

        .card .avatar {
            font-size: 48px;
            margin-bottom: 6px;
            filter: drop-shadow(0 0 20px rgba(0, 255, 200, 0.05));
        }

        .card .nick {
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
        }

        .card .role {
            font-size: 12px;
            color: #5a6a7a;
            margin-top: 2px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card .badge {
            display: inline-block;
            margin-top: 6px;
            font-size: 10px;
            padding: 2px 14px;
            border-radius: 20px;
            background: rgba(255, 200, 0, 0.06);
            color: #ffcc00;
            border: 1px solid rgba(255, 200, 0, 0.06);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: #111927;
            border: 1px solid rgba(0, 255, 200, 0.08);
            border-radius: 20px;
            max-width: 580px;
            width: 92%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 28px 24px;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: scale(0.95);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal .close {
            position: absolute;
            top: 12px;
            right: 18px;
            font-size: 28px;
            color: #5a6a7a;
            cursor: pointer;
            background: none;
            border: none;
            font-family: 'Courier New', monospace;
        }

        .modal .close:hover {
            color: #ffffff;
        }

        .modal .m-avatar {
            font-size: 56px;
            text-align: center;
            margin-bottom: 2px;
        }

        .modal .m-nick {
            font-size: 26px;
            font-weight: 700;
            color: #ffffff;
            text-align: center;
        }

        .modal .m-role {
            text-align: center;
            color: #00ffc8;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .modal .m-badge {
            text-align: center;
            color: #ffcc00;
            font-size: 13px;
            margin-bottom: 16px;
        }

        .modal .m-title {
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            margin: 12px 0 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            padding-bottom: 6px;
        }

        .modal .moments {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .modal .moments .moment {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 255, 200, 0.04);
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            transition: 0.25s;
        }

        .modal .moments .moment:hover {
            border-color: rgba(0, 255, 200, 0.1);
        }

        .modal .moments .moment img {
            width: 100%;
            border-radius: 8px;
            display: block;
            margin-bottom: 4px;
            object-fit: cover;
            aspect-ratio: 16/9;
            background: #0a0e17;
        }

        .modal .moments .moment .desc {
            font-size: 11px;
            color: #7a8ba3;
            line-height: 1.4;
            display: block;
            margin-top: 4px;
        }

        .modal .moments .moment .emoji {
            font-size: 32px;
            display: block;
            margin-bottom: 2px;
        }

        .modal .quote {
            margin-top: 14px;
            padding: 12px 16px;
            background: rgba(0, 255, 200, 0.03);
            border-left: 3px solid rgba(255, 200, 0, 0.2);
            border-radius: 4px;
            font-style: italic;
            color: #aabbcc;
            font-size: 15px;
            line-height: 1.5;
        }

        .modal .quote .author {
            display: block;
            margin-top: 4px;
            font-style: normal;
            color: #5a6a7a;
            font-size: 12px;
        }

        footer {
            border-top: 1px solid rgba(255, 255, 255, 0.02);
            padding: 20px 0;
            text-align: center;
            color: #3a4a5a;
            font-size: 12px;
        }

        footer a {
            color: #5a6a7a;
            text-decoration: none;
        }

        footer a:hover {
            color: #00ffc8;
        }

        @media (max-width: 700px) {
            .header-inner {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            .modal .moments {
                grid-template-columns: 1fr;
            }
            .card .avatar {
                font-size: 36px;
            }
            .card .nick {
                font-size: 16px;
            }
            .stats {
                gap: 12px;
                padding: 16px;
            }
            .stats .item .num {
                font-size: 22px;
            }
        }

        @media (max-width: 450px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="container header-inner">
            <div class="logo">
                ⚡ <span>CS 1.6</span>
                <small>ЛЕГЕНДЫ СЕРВЕРА</small>
            </div>
            <div class="subtitle">
                <i>🔥</i> 6 игроков · 0 скилла · 100% кринжа <i>🔥</i>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="stats">
            <div class="item">
                <span class="num">6</span>

            <div class="item">
                <span class="num">∞</span>
                <span class="label">Кринжа</span>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="grid" id="playerGrid"></div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <button class="close" id="modalClose">✕</button>
            <div class="m-avatar" id="mAvatar">🧠</div>
            <div class="m-nick" id="mNick">PaPaY</div>
            <div class="m-role" id="mRole">Главный бот</div>
            <div class="m-badge" id="mBadge">🏆 MVP кринжа</div>
            <div class="m-title">🔥 Прикольные моменты</div>
            <div class="moments" id="mMoments"></div>
            <div class="quote" id="mQuote">
                "Я купил AWP, а денег нет."
                <span class="author">— PaPaY</span>
            </div>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>⚡ CS 1.6 &bull; 2026 &bull; <a href="#">Присоединиться к кринжу</a></p>
        </div>
    </footer>

    <script>
        const players = [{
    id: 'papay',
    avatar: '👴',

    moments: [
        { img: 'papay_1.jpg', desc: 'Застрелил тиммейта вместо врага' },
        { emoji: '💸', desc: 'Купил AWP, а денег нет' },
        { emoji: '🔪', desc: 'Бежал с ножом на 5 врагов и умер' },
        { emoji: '🔄', desc: 'Сделал 3 круга вокруг карты и не нашёл никого' },

    quote: '"Я купил AWP, а денег нет."',

}, {
    id: 'drweb',

    nick: 'Dr.Web',
    role: '🛡️ Антивирус, который не помогает',
    badge: '💀 Лечил врагов',
    moments: [
        { emoji: '💉', desc: 'Кинул дым вместо лечебной гранаты' },
        { emoji: '🔥', desc: 'Лечил врага гранатой' },
        { emoji: '🤡', desc: 'Кричал "Я ЛЕЧУ!" и подорвал себя' },
        { emoji: '🎯', desc: 'Вылечил себя от пули — не помогло' },
        { emoji: '😂', desc: 'Бегал с аптечкой и просил ранить' },
    ],
    quote: '"Я полечу тебя... взрывом."',
    author: 'Dr.Web'

    id: 'alishka',
    avatar: '🎯',
    nick: 'Alishka',
    role: '🎯 Снайпер-неудачник',
    badge: '😎 10 промахов за раунд',
    moments: [
        { emoji: '🎯', desc: 'Промазал по стоячему врагу 10 раз' },
        { emoji: '💔', desc: 'Попал в своего тиммейта' },
        { emoji: '🌌', desc: 'Выстрелил в небо и попал в птицу' },
        { emoji: '😡', desc: 'Обвинил врага в том, что он двигался' },
        { emoji: '🔄', desc: 'Снял прицел и убил себя' },
    ],
    quote: '"Он стоял, я стоял, пуля пролетела."',
    author: 'Alishka'
}, {
    id: 'karina',
    avatar: '💥',
    nick: 'Karina',
    role: '💣 Женщина-катастрофа',
    badge: '☢️ Подорвала всех',
    moments: [
        { img: 'karina_1.jpg', desc: 'Подорвала себя' },
        { img: 'karina_2.jpg', desc: 'Подорвала тиммейта' },
        { img: 'karina_3.jpg', desc: 'Подорвала полкарты' },
        { img: 'karina_4.jpg', desc: 'Кинула флешку в себя и ослепла' },
        { emoji: '🎯', desc: 'Попала в врага... гранатой в руке' },
    ],
    quote: '"Граната — это моё всё."',
    author: 'Karina'
}, {
    id: 'zloy',
    avatar: '😡',
    nick: 'ZLOY',
    role: '😡 Токсичный нуб',
    badge: '🎙️ Кричал в микрофон',
    moments: [
        { img: 'zloy_1.jpg', desc: 'Кричал в микрофон 10 минут' },
        { img: 'zloy_2.jpg', desc: 'Бегал с пустым магазином' },
        { emoji: '💥', desc: 'Умер от своей флешки' },
        { emoji: '😤', desc: 'Обвинил всех в том, что они нуб' },
        { emoji: '🎯', desc: 'Попал в тиммейта и сказал "ты сам виноват"' },
    ],
    quote: '"ДА ВЫ ЧТО, БЛЯТЬ?! С КАКОГО ХРЕНА?!"',
    author: 'ZLOY'
}, {
    id: 'azbe',
    avatar: '😍',
    nick: 'aZbe',
    role: '😍 Uzi Uchun Krassavchik',
    badge: '🎙️ Sekinrooooo',
    moments: [
        { img: 'azbe_1.jpg', desc: 'Men Uchaman' },
        { img: 'azbe_2.jpg', desc: 'Voy boshim' },
        { img: 'azbe_3.jpg', desc: 'Buyoqqa kel))' },
        { emoji: '💥', desc: 'Flew otib ukib qoldi' },
        { emoji: '😤', desc: 'Hammang cheater deb baqirdi lekin Uzi nubb' },
        { emoji: '🎯', desc: 'Xammani flewlab quydi "lekin men aybdor emasman deb turib oldi"' },
    ],
    quote: '"ДА ВЫ ЧТО, БЛЯТЬ?! С КАКОГО ХРЕНА?!"',
    author: 'aZbe'
}];
            id: 'sit',
            avatar: '🪑',
            nick: 'SIT',
            role: '🪑 Сидит и ничего не делает',
            badge: '🧘 Мастер бездействия',
            moments: [
                { img: 'sit_1.jpg', desc: 'Сидел весь раунд в углу' },
                { emoji: '😴', desc: 'Забыл купить оружие' },
                { emoji: '👀', desc: 'Не заметил врага, который прошёл мимо' },
                { emoji: '😂', desc: 'Сказал "я сплю" и умер' },
                { emoji: '🎯', desc: 'Сделал 0 урона за игру' },
            ],
            quote: '"... (молчание)"',
            author: 'SIT'
        }];

        const grid = document.getElementById('playerGrid');

        players.forEach(p => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                        <div class="avatar">${p.avatar}</div>
                        <div class="nick">${p.nick}</div>
                        <div class="role">${p.role}</div>
                        <div class="badge">${p.badge}</div>
                    `;
            card.addEventListener('click', () => openModal(p.id));
            grid.appendChild(card);
        });

        const modal = document.getElementById('modal');
        const modalClose = document.getElementById('modalClose');

        function openModal(id) {
            const p = players.find(x => x.id === id);
            if (!p) return;

            document.getElementById('mAvatar').textContent = p.avatar;
            document.getElementById('mNick').textContent = p.nick;
            document.getElementById('mRole').textContent = p.role;
            document.getElementById('mBadge').textContent = p.badge;

            const momentsContainer = document.getElementById('mMoments');
            momentsContainer.innerHTML = '';
            p.moments.forEach(m => {
                const div = document.createElement('div');
                div.className = 'moment';
                if (m.img) {
                    div.innerHTML = `
                                <img src="${m.img}" alt="момент" loading="lazy" />
                                <span class="desc">${m.desc}</span>
                            `;
                } else {
                    div.innerHTML = `
                                <span class="emoji">${m.emoji}</span>
                                <span class="desc">${m.desc}</span>
                            `;
                }
                momentsContainer.appendChild(div);
            });

            document.getElementById('mQuote').innerHTML = `
                        "${p.quote}"
                        <span class="author">— ${p.author}</span>
                    `;

            modal.classList.add('open');
        }

        modalClose.addEventListener('click', () => modal.classList.remove('open'));
        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.classList.remove('open');
        });
    </script>

</body>
</html>
